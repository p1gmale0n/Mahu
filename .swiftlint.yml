included:
  - Mahu

excluded:
  - build
  - .ralphex
  - .git
  - source-assets

disabled_rules:
  # Project code uses explicit access levels selectively; requiring them everywhere
  # would add noise without improving the current small app architecture.
  - explicit_acl
  # Existing code intentionally uses trailing commas in multi-line fixtures and
  # config-like literals. Enabling this before a formatter pass creates noise.
  - trailing_comma
  # Existing code has a few style-only cases; keep initial lint adoption
  # focused on safer correctness/readability signals rather than churn.
  - control_statement
  - reduce_boolean

opt_in_rules:
  - empty_count
  - empty_string
  - first_where
  - literal_expression_end_indentation
  - modifier_order
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call

line_length:
  warning: 300
  error: 400
  ignores_comments: true
  ignores_urls: true
  ignores_function_declarations: false
  ignores_interpolated_strings: true

file_length:
  warning: 700
  error: 1000

function_body_length:
  warning: 120
  error: 220

type_body_length:
  warning: 700
  error: 1000

identifier_name:
  min_length:
    warning: 2
  max_length:
    warning: 60
    error: 80
  excluded:
    - id
    - x
    - y

large_tuple:
  warning: 4
  error: 6

cyclomatic_complexity:
  warning: 15
  error: 25

function_parameter_count:
  warning: 8
  error: 10

nesting:
  type_level:
    warning: 2
  function_level:
    warning: 3

reporter: "xcode"
